<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Online Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>

<header class="header">
        <h1 class="logo">Online Shop</h1>

        <a href="../cart/index.html" class="cart-icon" aria-label="Go to cart">
        <!-- Cart SVG Icon from https://heroicons.com -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="cart-svg">
  <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
</svg>
</a>
</header>

<main>
    <section class="checkout-page">
        <div class="checkout-panel">
            <h2 class="checkout-heading">Payment details</h2>
            <p class="checkout-note">Required fields marked with *</p>

            <form class="checkout-form">
                <label for="first-name">First Name *</label>
                <input type="text" id="first-name" name="first-name" required/>

                <label for="last-name">Last Name *</label>
                <input type="text" id="last-name" name="last-name" required />

                <label for="country">Country *</label>
                <input type="text" id="country" name="country" required />

                <label for="street-address">Street Address *</label>
                <input type="text" id="street-address" name="street-address" placeholder="Address" required/>

                <input type="text" id="street-address-2" name="street-address-2" placeholder="Apartment, suite, unit etc." />

                <label for="postal-code">Postal Code *</label>
                <input type="text" id="postal-code" name="postal-code" required />
                
                <label for="city">City / Town *</label>
                <input type="text" id="city" name="city" required    />

                <label for="phone">Phone *</label>
                <input type="text" id="phone" name="phone" required />

                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required />
            </form>
        </div>

        <section class="checkout-panel payment-panel">
            <label class="payment-option">
                <input type="radio" name="payment-method" checked />
                <span>Card</span>
            </label>

            <label class="payment-option">
                <input type="radio" name="payment-method" />
                <span>Vipps</span>
            </label>

            <label class="payment-option">
                <input type="radio" name="payment-method" />
                <span>PayPal</span>
            </label>
        </section>

        <section class="checkout-panel summary-panel">
            <h3 class="summary-title">Your order</h3>

            <div id="checkout-items">
                <!-- Cart items will be rendered here with JavaScript -->
            </div>

            <div class="summary-row total-row">
                <span>Total</span>
                <span id="checkout-total"></span>
            </div>
        </section>

        <a href="../success/index.html" class="button--primary checkout-complete-button">Complete Purchase</a>
    </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Online Shop.</p>
    </footer>

    <script src="../js/checkout.js"></script>
    
</body>
</html>
