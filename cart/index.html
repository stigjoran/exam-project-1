<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Online Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>

<header class="header">
        <h1 class="logo">Online Shop</h1>

        
        <!-- Cart SVG Icon from https://heroicons.com -->
        <div class="cart-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="cart-svg">
  <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
</svg>
</div>
</header>

<main>
    <section class="cart-page">
        <h2 class="section-title">Cart</h2>

        <div class="cart-items">
            <article class="cart-item card">
                <div class="cart-item-image image-placeholder">Image</div>

                <div class="cart-item-details">
                    <h3>Bluetooth Speaker</h3>
                    <p class="cart-item-price">$199.99</p>

                    <div class="quantity-controls">
                        <button type="button" class="quantity-button">-</button>
                        <span class="quantity-value">1</span>
                        <button type="button" class="quantity-button">+</button>
                    </div>

                    <button type="button" class="remove-button">Remove</button>
                </div>
            </article>


            <article class="cart-item card">
                <div class="cart-item-image image-placeholder">Image</div>
                <div class="cart-item-details">
                    <h3>Black Watch</h3>
                    <p class="cart-item-price">$299.99</p>
                    <div class="quantity-controls">
                        <button type="button" class="quantity-button">-</button>
                        <span class="quantity-value">1</span>
                        <button type="button" class="quantity-button">+</button>
                    </div>
                    <button type="button" class="remove-button">Remove</button>
                </div>
            </article>

                <article class="cart-item card">
                <div class="cart-item-image image-placeholder">Image</div>
                <div class="cart-item-details">
                    <h3>Wireless Earbuds</h3>
                    <p class="cart-item-price">$199.99</p>
                    <div class="quantity-controls">
                        <button type="button" class="quantity-button">-</button>
                        <span class="quantity-value">1</span>
                        <button type="button" class="quantity-button">+</button>
                    </div>
                    <button type="button" class="remove-button">Remove</button>
                </div>
            </article>
        </div>

        <section class="cart-summary card">
            <h3 class="cart-total">Total $699.97</h3>
                <button type="button" class="clear-cart-button">Clear Cart</button>
                <a href="../checkout/index.html" class="button--primary checkout-button">Proceed to Checkout</a>
        </section>
    </section>
</main>

<footer class="footer">
        <p>&copy; 2026 Online Shop.</p>
    </footer>

    <script src="../js/main.js"></script>
    
</body>
</html>
